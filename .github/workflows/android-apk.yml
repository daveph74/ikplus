# Builds the Android APK on a GitHub runner (this container's egress policy
# blocks the export-template downloads, so CI is where the APK gets made) and
# attaches it to a GitHub Release for phone-friendly download.
name: Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: 4.7-stable
  GODOT_VERSION_DIR: 4.7.stable

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;34.0.0 platforms;android-34"

      - name: Download Godot editor and export templates
        run: |
          curl -fsSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          curl -fsSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot-bin
          chmod +x godot-bin
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}"
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}/"

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v -keystore "$HOME/debug.keystore" \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Point Godot at the SDK and keystore
        run: |
          mkdir -p "$HOME/.config/godot"
          for f in editor_settings-4.7.tres editor_settings-4.tres; do
            cat > "$HOME/.config/godot/$f" <<SETTINGS
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/debug_keystore = "${HOME}/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS
          done

      - name: Import assets
        run: ./godot-bin --headless --path . --import || true

      - name: Export APK
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /home/runner/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p build
          ./godot-bin --headless --path . --export-debug "Android" build/TripleStrike.apk
          ls -la build/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-build-${{ github.run_number }}
          name: "Triple Strike APK #${{ github.run_number }}"
          body: |
            Debug-signed Android build (arm64). Download TripleStrike.apk on
            your phone, allow installs from your browser when prompted, and
            open it. Landscape; touch controls appear automatically.
          files: build/TripleStrike.apk

      - uses: actions/upload-artifact@v4
        with:
          name: TripleStrike-apk
          path: build/TripleStrike.apk
